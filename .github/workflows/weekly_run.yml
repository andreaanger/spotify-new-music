name: Run Weekly Spotify New Music Python Script

on:
  schedule:
    # Runs at 00:23 UTC every Friday
    - cron: '23 7 * * 5'
  workflow_dispatch: # Allows you to manually trigger the script from the Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Python script with Envs
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
        SPOTIFY_PLAYLIST_NAME: ${{ secrets.SPOTIFY_PLAYLIST_NAME }}
        NEW_MUSIC_DAYS_THRESHOLD: ${{ secrets.NEW_MUSIC_DAYS_THRESHOLD }}
      run: python main.py